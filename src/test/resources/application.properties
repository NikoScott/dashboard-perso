# Configuration pour les tests : H2 en mémoire, Flyway désactivé, mail fictif.

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA recrée le schéma depuis les entités (Flyway est OFF en test).
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# JWT (clé de test uniquement — 32 octets décodés)
app.jwt.secret=Q3JtRnJlZWxhbmNlVGVzdFNlY3JldEtleUZvclRlc3Rz
app.jwt.expiration-ms=86400000

# Mail fictif (bean créé mais aucune connexion tentée au démarrage)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
crm.email.destinataire=test@test.com

crm.relance.delai-jours=7
