# Profil dev local : H2 en mémoire, pas de PostgreSQL requis.
# Lancer avec : ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

spring.datasource.url=jdbc:h2:mem:crmdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Remplace les variables d'env requises en prod
app.jwt.secret=Q3JtRnJlZWxhbmNlVGVzdFNlY3JldEtleUZvclRlc3Rz
server.port=8080

# Mail désactivé en dev (pas de serveur SMTP)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=dev
spring.mail.password=dev
crm.email.destinataire=dev@localhost

crm.inscription.ouverte=true
