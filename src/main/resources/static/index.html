<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobTracker</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 antialiased">
  <div id="app"></div>

  <!-- Modal -->
  <div id="modal-overlay"
       class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4"
       onclick="if(event.target===this)closeModal()">
    <div id="modal-content"
         class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-y-auto max-h-[90vh]">
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"
       class="hidden fixed bottom-6 right-6 z-50 px-4 py-3 rounded-xl shadow-xl text-sm font-medium pointer-events-none">
  </div>

  <script src="app.js"></script>
</body>
</html>
