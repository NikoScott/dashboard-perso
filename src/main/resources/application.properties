spring.application.name=jobtracker

# --- PostgreSQL (variables fournies automatiquement par Railway) ---
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Port (Railway injecte $PORT) ---
server.port=${PORT:8080}

# --- JWT (variable à définir dans Railway : JWT_SECRET) ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# --- Email (variables optionnelles à définir dans Railway) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
crm.email.destinataire=${MAIL_DESTINATAIRE:}

# --- Règles métier ---
crm.relance.delai-jours=7
crm.inscription.ouverte=${INSCRIPTION_OUVERTE:false}
