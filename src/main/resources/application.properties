spring.application.name=crm-freelance

# --- Base H2 en mémoire (dev uniquement) ---
# jdbc:h2:mem -> base recréée à chaque démarrage, rien n'est persisté sur disque.
spring.datasource.url=jdbc:h2:mem:crmdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate recrée le schéma à partir des entités JPA à chaque démarrage.
# 'create-drop' = pratique en dev, JAMAIS en prod (on perdrait les données).
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console web H2 accessible sur http://localhost:8080/h2-console
# (JDBC URL à saisir dans la console : jdbc:h2:mem:crmdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Règles métier ---
# Délai (en jours) sans action au-delà duquel une opportunité est "à relancer".
crm.relance.delai-jours=7
